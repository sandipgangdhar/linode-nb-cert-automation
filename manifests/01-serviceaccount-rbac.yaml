apiVersion: v1
kind: ServiceAccount
metadata:
  name: nb-cert-automation
  namespace: nb-cert-automation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nb-cert-automation-secret-writer
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nb-cert-automation-secret-writer
  namespace: default
subjects:
  - kind: ServiceAccount
    name: nb-cert-automation
    namespace: nb-cert-automation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nb-cert-automation-secret-writer
